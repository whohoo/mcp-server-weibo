# ==============================================
# 日志配置文件 | TOML 格式
# 加载方式：Python 3.11+ 使用内置 tomllib
# ==============================================

# 日志配置版本（固定为 1）
version = 1
# 不禁用已存在的日志器，避免覆盖第三方库原有日志
disable_existing_loggers = false

# ==============================================
# 1. 日志格式器（Formatter）定义
# ==============================================
[formatters.debug]
class = "custom_formatter.CustomFormatter"  # 自定义调试格式器, 已弃用

[formatters.extra]
format = "%(asctime)s - %(name)s - %(levelname)s %(message)s - %(filename)s:%(lineno)s"  # 详细格式：时间+名称+级别+信息+文件行号, 已弃用

[formatters.simple]
format = "[%(name)s] - %(message)s"  # 控制台简洁格式：仅日志名+信息, 主要用于rich.logging.RichHandler

[formatters.plain]
class = "custom_formatter.PlainFormatter"  # 自定义文件格式器, 主要用于 rich markup 输出到文件时去除富文本标记
format = "%(asctime)s - \\[%(name)s] - %(levelname)s - %(message)s \\[@%(filename)s:%(lineno)d]"  # 文件日志标准格式

# ==============================================
# 2. 日志处理器（Handler）定义
# ==============================================
[handlers.console]
class = "rich.logging.RichHandler"        # 美化控制台输出, 支持 markup 和 rich_tracebacks
formatter = "simple"                     # 使用简洁格式
markup = true                            # 开启富文本标记（支持颜色）
rich_tracebacks = true                   # 美化异常堆栈
tracebacks_show_locals = true            # 堆栈显示局部变量

[handlers.logfile]
class = "logging.FileHandler"            # 文件输出处理器
formatter = "plain"                      # 使用标准文件格式
filename = "logs/mcp_server_weibo.log"           # 日志文件路径
mode = "a"                               # 追加模式
encoding = "utf8"                        # UTF-8 编码

[handlers.errfile]
class = "logging.FileHandler"            # 错误专用文件处理器, 单独记录 ERROR 及以上级别
formatter = "plain"                      # 使用标准文件格式
level = "ERROR"                          # 只记录 ERROR 及以上级别
filename = "logs/mcp_server_weibo.err"           # 错误日志文件路径
mode = "a"                               # 追加模式
encoding = "utf8"                        # UTF-8 编码

# ==============================================
# 3. 第三方库日志级别控制（减少噪音）
# ==============================================
[loggers."sse_starlette.sse"]
level = "INFO"                        # 异步事件循环只显示警告
handlers = ["console", "logfile"]
propagate = false

# ==============================================
# 4. 根日志器（全局默认配置）
# ==============================================
[root]
level = "INFO"                          # 最低显示级别：DEBUG
handlers = ["console", "logfile", "errfile"]  # 同时输出到控制台、普通日志、错误日志
propagate = false                        # 根日志器无需向上传递